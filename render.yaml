# Blueprint Render (optionnel). Vérifiez les offres / noms sur https://render.com/docs/blueprint-spec
# Si la base gratuite n’est plus dispo, créez Postgres dans le tableau de bord et liez DATABASE_URL à la main.
databases:
  - name: kokozito-db
    plan: free
    databaseName: kokozito
    user: kokozito

services:
  - type: web
    name: kokozito-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: '3.12.0'
      - key: DJANGO_DEBUG
        value: '0'
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kokozito-db
          property: connectionString
