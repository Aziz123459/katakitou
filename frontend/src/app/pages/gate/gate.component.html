<div class="gate">
  <div class="gate__panel">
    <h1 class="gate__brand">{{ siteBrand }}</h1>
    <p class="gate__tagline">Sac de douche &amp; serviette — toilettage zen pour chats.</p>

    <div class="gate__actions">
      <a routerLink="/boutique" class="gate__btn gate__btn--primary"> Continuer vers la boutique </a>
      <p class="gate__hint">Parcours client : produits, panier, commande.</p>
    </div>

    <div class="gate__admin" aria-labelledby="gate-admin-title">
      <h2 id="gate-admin-title" class="gate__admin-title">Espace administrateur</h2>
      <div class="gate__fields">
        <label class="gate__label" for="gate-user">E-mail ou nom d’utilisateur</label>
        <input
          id="gate-user"
          type="text"
          class="gate__input"
          name="adminEmail"
          [(ngModel)]="adminEmail"
          autocomplete="username"
          (input)="clearAdminError()"
        />
        <label class="gate__label" for="gate-pass">Mot de passe</label>
        <input
          id="gate-pass"
          type="password"
          class="gate__input"
          name="adminPassword"
          [(ngModel)]="adminPassword"
          autocomplete="current-password"
          (keydown.enter)="loginAdmin()"
          (input)="clearAdminError()"
        />
      </div>
      @if (adminError()) {
        <div class="gate__alert" role="alert" aria-live="assertive" tabindex="-1">
          <span class="gate__alert-title">Impossible de se connecter</span>
          <p class="gate__alert-body">{{ adminError() }}</p>
        </div>
      }
      <button type="button" class="gate__btn gate__btn--admin" (click)="loginAdmin()" [disabled]="adminLoading()">
        {{ adminLoading() ? 'Connexion…' : 'Connexion tableau de bord' }}
      </button>
    </div>
  </div>
</div>
